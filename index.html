<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Scientific Number Scanner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #667eea, #764ba2);
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 300px;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      width: 90%;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #5a67d8;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Scientific Number Scanner</h2>

    <input type="text" id="inputNumber" placeholder="Contoh: 2 x 10^0">
    <br>
    <button onclick="checkScientific()">Check</button>

    <div id="result"></div>
  </div>

  <script>
    function checkScientific() {
      let input = document.getElementById("inputNumber").value.trim();

      let regex = /^-?\d+(\.\d+)?\s*(x|×)\s*10\^[-+]?\d+$|^-?\d+(\.\d+)?e[-+]?\d+$/i;

      if (regex.test(input)) {
        document.getElementById("result").innerText = "Yes, it is scientific number";
        document.getElementById("result").style.color = "green";
      } else {
        document.getElementById("result").innerText = "No, it is not scientific number";
        document.getElementById("result").style.color = "red";
      }
    }
  </script>

</body>
</html>
